// Función para crear tarjeta de empresa
function crearTarjetaEmpresa(empresa) {
  const probabilidad = Number.isFinite(empresa.probabilidad)
    ? empresa.probabilidad
    : Math.floor(Math.random() * (92 - 73 + 1) + 73);

  return `
    <article class="bg-white rounded-lg md:rounded-xl border border-stone-200 p-4 md:p-6 shadow-sm fade-up hover:-translate-y-1 hover:shadow-lg transition-all duration-300">
      <div class="flex items-start justify-between gap-3 md:gap-4 border-b border-stone-100 pb-3 md:pb-4 mb-3 md:mb-4 flex-wrap">

            <span class="material-symbols-outlined text-[12px] md:text-[14px]">description</span>
            Descripción
          </p>
          <p class="mt-1 text-stone-700 leading-relaxed font-medium text-xs md:text-sm">${empresa.descripcion}</p>
        </div>

        <div class="bg-stone-50/70 rounded-lg p-2 md:p-3 border border-stone-100">
          <p class="text-[9px] md:text-[10px] uppercase tracking-widest font-bold text-stone-500 flex items-center gap-1">

            Empleados

// Función para renderizar empresas con filtro
function renderizarEmpresas(filtro = 'todos') {
  const grid = document.getElementById('empresas-grid');
  grid.innerHTML = '';

  let empresasFiltradas = empresasDB;
  if (filtro !== 'todos') {
    empresasFiltradas = empresasDB.filter(e => e.sector === filtro);
  }

  empresasFiltradas.forEach((empresa, index) => {
    const html = crearTarjetaEmpresa(empresa);
    const div = document.createElement('div');
    div.innerHTML = html;
    div.style.animationDelay = `${index * 50}ms`;
    grid.appendChild(div.firstElementChild);
  });

  // Actualizar contador
  document.getElementById('contador-empresas').textContent = empresasFiltradas.length;
}

// Event listeners para filtros
document.addEventListener('DOMContentLoaded', function() {
  const botonesFiltro = document.querySelectorAll('.filtro-btn');

  botonesFiltro.forEach(btn => {
    btn.addEventListener('click', function() {
      // Remover clase activa de todos
      botonesFiltro.forEach(b => {
        b.classList.remove('bg-[#9d3f00]', 'text-white');
        b.classList.add('bg-stone-200', 'text-stone-700');
      });

      // Agregar clase activa al botón clickeado
      this.classList.remove('bg-stone-200', 'text-stone-700');
      this.classList.add('bg-[#9d3f00]', 'text-white');

      // Renderizar empresas con el filtro
      const filtro = this.getAttribute('data-filtro');
      renderizarEmpresas(filtro);
    });
  });

  // Renderizar todas las empresas al cargar
  renderizarEmpresas('todos');
});
